                    <h2>アインシュタイン方程式</h2>
                    <p>
                        アインシュタイン方程式は，以下のような方程式である．
                        \begin{equation} G_{\mu \nu} = \frac{8 \pi G}{c^4}
                        {T^\mu}_\nu \end{equation} ここで，\( G_{\mu \nu}
                        \)はアインシュタインテンソル，\( c
                        \)は光速，\(G\)は重力定数，\({T^\mu}_\nu\)はエネルギー運動量テンソルである．
                    </p>
